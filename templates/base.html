<html>
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>{% block title %}{% endblock%}</title>
    </head>

    <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('dash.dashboard')}}">Non's financial</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav">
            {% if session.get("username") %}
            <a class="nav-link active" href="{{ url_for('dash.dashboard')}}">Home</a>
            <a class="nav-link" href="{{ url_for('auth.logout')}}">Logout</a>
            <a class="nav-link" href="{{ url_for('fina.add')}}">Add</a>
            {% else %}
            <a class="nav-link" href="{{ url_for('auth.register')}}">Register</a>
            <a class="nav-link" href="{{ url_for('auth.login')}}">Login</a>
            {% endif %}
        </div>
        </div>
    </div>
    </nav>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="container mt-3">
            {% for message in messages %}
            <div class="alert alert-info py-2 mb-2" role="alert">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% endwith %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>

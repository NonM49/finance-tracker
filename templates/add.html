{% extends "base.html" %}
{% block title %}Add{% endblock %}
{% block content %}
<form method="POST">
    <input name="amount" 
    type="number" 
    step="0.01" 
    placeholder="amount"
    required
    min="0">
    <br/>
    
    <select name="type" requited>
        <option value="">Select type</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
    </select>
    <br/>

    <input name="description" placeholder="description" maxlength=100>

    <button type="submit">Add</button>
</form>
{% endblock %}

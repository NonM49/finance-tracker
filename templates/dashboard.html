{% extends "base.html" %}
{% block title %}
Home
{% endblock %}

{% block content %}
<h3 align="center">Dashboard</h3>
<h2> your Transactions</h2>
<table>
<tr>
    <th>Amount</th>
    <th>Type</th>
    <th>Description</th>
</tr>

{% for t in transactions %}
<tr>
    <td>{{ t[0] }}</td>
    <td>{{ t[1] }}</td>
    <td>{{ t[2] }}</td>
</tr>
{% endfor %}

</table>
<h2> Balance: {{balance}}</h2>

{% endblock %}
